spring:
  application:
    name: zero-trust-iam-reference
  datasource:
    url: ${DB_URL:jdbc:h2:mem:ztidb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: ${SERVER_PORT:8080}

security:
  jwt:
    issuer: zero-trust-iam-reference
    # Use a 256-bit+ secret in production via environment variable JWT_SECRET.
    secret: ${JWT_SECRET:replace-this-development-secret-with-a-strong-256-bit-secret}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:30}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized

springdoc:
  swagger-ui:
    path: /swagger-ui.html
